}

  font-size: 12px;
  border-radius: 6px;

}

.big {
  font-size: 50px;
  color: red;
  font-weight: bold;
}
.resetBtn {
  background: white !important;
  color: red !important;
  font-weight: bold;
  border: 2px solid red;

  width: 100%;
  height: 320px;
  margin-top: 40px;
  margin-bottom: 40px;

  border-radius: 12px;

  .container {

  }

  }

  grid-template-columns: repeat(3,1fr);

  margin-top: 30px;

th {

  padding: 10px;
}

td {

}

.highlight {
  color: red;
  font-weight: bold;
}
.highlight-row {

table.compact th,
table.compact td {
  width: 33%;

table.full th,
table.full td {

function formatNumericInput(el, allowNegative = false){

  let value = el.value;

  // 🔥 Komma → Punkt
  value = value.replace(/,/g, ".");

  let result = "";
  let dotUsed = false;
  let minusUsed = false;

  for(let i = 0; i < value.length; i++){
    const c = value[i];

    if(/[0-9]/.test(c)){
      result += c;
    }

    else if(c === "." && !dotUsed){
      result += ".";
      dotUsed = true;
    }

    else if(c === "-" && allowNegative && i === 0 && !minusUsed){
      result += "-";
      minusUsed = true;
    }
  }

  el.value = result;
}

function initCarSearch(){

  const input = document.getElementById("carSearch");
  const dropdown = document.getElementById("carDropdown");

  function renderList(filter = ""){

    dropdown.innerHTML = "";

    const val = filter.toLowerCase();

    const list = vehiclePresets
      .filter(v => v.name.toLowerCase().includes(val))
      .sort((a,b)=> a.name.localeCompare(b.name)); // 🔥 optional sauber

    list.forEach(v=>{

      const item = document.createElement("div");

      item.textContent = v.name;
      item.style.padding = "10px";
      item.style.cursor = "pointer";

      item.onmouseenter = ()=> item.style.background = "#222";
      item.onmouseleave = ()=> item.style.background = "transparent";

      item.onclick = ()=>{
        input.value = v.name;

        document.getElementById("cw").value = v.cw;
        document.getElementById("area").value = v.area;

        dropdown.style.display = "none";
      };

      dropdown.appendChild(item);
    });

    dropdown.style.display = "block";
  }

  // 🔥 TIP → FILTERN
  input.addEventListener("input", function(){
    renderList(this.value);
  });

  // 🔥 CLICK → ALLE AUTOS
  input.addEventListener("focus", function(){
    renderList(""); // 🔥 GANZE LISTE
  });

  // 🔥 CLICK OUTSIDE → CLOSE
  document.addEventListener("click", (e)=>{
    if(!input.contains(e.target) && !dropdown.contains(e.target)){
      dropdown.style.display = "none";
    }
  });
}

// ---------- GRAPH ----------
function drawGraph(results){

const widthScreen = window.innerWidth;
const isMobile = widthScreen < 600;
const isPortrait = window.innerHeight > window.innerWidth;

  const canvas = document.getElementById("graph");
  const ctx = canvas.getContext("2d");

  
// RESET
ctx.setTransform(1,0,0,1,0,0);

// WICHTIG: Canvas = exakt sichtbare Größe
const dpr = window.devicePixelRatio || 1;
const rect = canvas.getBoundingClientRect();

const width = rect.width;
const height = isMobile ? 260 : 320; // 🔥 FIX Höhe mobile

canvas.width = width * dpr;
canvas.height = height * dpr;
canvas.style.height = height + "px";

ctx.setTransform(dpr,0,0,dpr,0,0);

// CLEAR
ctx.clearRect(0,0,canvas.width,canvas.height);

  // ===== DATEN =====
  const points = results.map((r,i)=>{
    const parts = r.label.split("-");
    if(parts.length !== 2) return null;

    return {
      index: i,
      speed: (parseFloat(parts[0]) + parseFloat(parts[1])) / 2,
      rpm: r.rpm !== "-" ? r.rpm : null,
      ps: r.ps,
      nm: r.nm !== "-" ? r.nm : null
    };
  }).filter(p=>p);

  if(points.length < 2) return;

  const hasNm = singleGear && points.some(p => p.nm !== null);

  const pts = useRPM
    ? points.filter(p => p.rpm !== null)
    : points;

const scale = 1;

const fontMain = isMobile ? 10 : 13;
const fontSmall = isMobile ? 8 : 11;
const fontBold = isMobile ? "bold 9px Arial" : "bold 11px Arial";

// 🔥 MEHR PLATZ FÜR PS / NM
const padLeft = isMobile 
  ? (isPortrait ? 35 : 40)
  : 60;
const padRight = hasNm 
  ? (isMobile ? 70 : 60)   // 🔥 mehr Platz rechts
  : (isMobile ? 20 : 20);
const padTop = 20;
const padBottom = 55;

  if(pts.length < 2) return;

  // ===== X SKALA =====
  let minX, maxX;

  if(useRPM){
    const rpms = pts.map(p=>p.rpm);

    minX = Math.floor(Math.min(...rpms) / 500) * 500;
    maxX = Math.ceil(Math.max(...rpms) / 500) * 500;

  } else {
    minX = Math.min(...pts.map(p=>p.speed));
    maxX = Math.max(...pts.map(p=>p.speed));
  }

  // ===== Y SKALA (APP STYLE) =====
  const psVals = pts.map(p=>p.ps);
  const nmVals = hasNm ? pts.map(p=>p.nm || 0) : [];

  const minYRaw = Math.min(
    Math.min(...psVals),
    hasNm ? Math.min(...nmVals) : Infinity
  );

  const maxYRaw = Math.max(
    Math.max(...psVals),
    hasNm ? Math.max(...nmVals) : 0
  );

  const stepY = maxYRaw <= 300 ? 25 : 50;

  const yMin = Math.floor(minYRaw / stepY) * stepY;
  const yMax = Math.ceil(maxYRaw / stepY) * stepY;

  // ===== LAYOUT =====
const left = padLeft;
const right = padRight;
const top = padTop;
const bottom = padBottom;

  const w = width - left - right;
  const h = height - top - bottom;

  const x = (p)=>{
    const v = useRPM ? p.rpm : p.speed;
    return left + ((v - minX) / (maxX - minX)) * w;
  };

  const y = (val)=>{
    return top + h - ((val - yMin)/(yMax - yMin)) * h;
  };

  const clamp = (v,min,max)=>Math.max(min,Math.min(v,max));

  // ===== GRID =====
  ctx.strokeStyle = "#222";
  ctx.lineWidth = 1;

  for(let v=yMin; v<=yMax; v+=stepY){
    const yp = y(v);

    ctx.beginPath();
    ctx.moveTo(left,yp);
    ctx.lineTo(left+w,yp);
    ctx.stroke();

    // PS links
    ctx.fillStyle = "red";
    ctx.font = fontSmall + "px Arial";
    ctx.textAlign = "right";
    ctx.fillText(v, left - (isMobile ? 4 : 6), yp + 4);

    // Nm rechts
    if(hasNm){
      ctx.fillStyle = "#00eaff";
      ctx.textAlign = "left";
      ctx.fillText(v, left + w + (isMobile ? 8 : 10), yp + 4);
    }
  }

  // ===== AXES =====
  ctx.strokeStyle = "#888";

  // Y links
  ctx.beginPath();
  ctx.moveTo(left,top);
  ctx.lineTo(left,top+h);
  ctx.stroke();

  // X unten
  ctx.beginPath();
  ctx.moveTo(left,top+h);
  ctx.lineTo(left+w,top+h);
  ctx.stroke();
// ===== X TICKS (FIXED) =====
ctx.strokeStyle = "#888";

if(useRPM){

  for(let v = minX; v <= maxX; v += 500){
    const px = left + ((v - minX)/(maxX - minX)) * w;

    ctx.beginPath();
    ctx.moveTo(px, top + h);
    ctx.lineTo(px, top + h + 5);
    ctx.stroke();
  }

} else {

  pts.forEach(p=>{
    const px = x(p);

    ctx.beginPath();
    ctx.moveTo(px, top + h);
    ctx.lineTo(px, top + h + 5);
    ctx.stroke();
  });

}

  // Y rechts (Nm)
  if(hasNm){
    ctx.beginPath();
    ctx.moveTo(left+w,top);
    ctx.lineTo(left+w,top+h);
    ctx.stroke();
  }
ctx.strokeStyle = "#444";
ctx.lineWidth = 1;

ctx.strokeRect(left, top, w, h);
  // ===== PS LINE =====
  ctx.beginPath();
  ctx.strokeStyle = "#ff2a2a";
  ctx.lineWidth = 3;

  pts.forEach((p,i)=>{
    const px = x(p);
    const py = y(p.ps);

    if(i===0) ctx.moveTo(px,py);
    else ctx.lineTo(px,py);
  });

  ctx.stroke();

  // ===== NM LINE =====
  if(hasNm){
    ctx.beginPath();
    ctx.strokeStyle = "#00eaff";
    ctx.lineWidth = 2;

    let first = true;

    pts.forEach(p=>{
      if(p.nm === null) return;

      const px = x(p);
      const py = y(p.nm);

      if(first){
        ctx.moveTo(px,py);
        first=false;
      } else {
        ctx.lineTo(px,py);
      }
    });

    ctx.stroke();
  }

  // ===== PEAK PS =====
  const peakPs = pts.reduce((a,b)=>a.ps>b.ps?a:b);

  let px = x(peakPs);
  let py = y(peakPs.ps);

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(px,py,6,0,6.28);
  ctx.fill();

  ctx.fillStyle = "red";
  ctx.font = fontBold;
  ctx.textAlign = "left";

  ctx.fillText(
  `Peak ${peakPs.ps} PS`,
  clamp(px+8,left+5,left+w-100),
  clamp(py-12, top+15, top+h-10)
  );

  // ===== PEAK NM =====
  if(hasNm){
    const peakNm = pts
      .filter(p=>p.nm!==null)
      .reduce((a,b)=>a.nm>b.nm?a:b);

    const nx = x(peakNm);
    const ny = y(peakNm.nm);

    ctx.fillStyle = "#00eaff";
    ctx.beginPath();
    ctx.arc(nx,ny,5,0,6.28);
    ctx.fill();

    ctx.fillStyle = "#00eaff";
    ctx.fillText(
      `Peak ${peakNm.nm} Nm`,
  clamp(nx-90,left+5,left+w-5),
  clamp(ny-12, top+15, top+h-10)
    );
  }

 // ===== X LABELS =====
ctx.fillStyle = "#fff";
ctx.textAlign = "center";
ctx.font = fontSmall + "px Arial";

if(useRPM){

  let stepRPM = 500;

  if(isMobile && isPortrait){
    stepRPM = 1000;   // 🔥 weniger Labels
  } else if(isMobile){
    stepRPM = 700;
  }

  for(let v=minX; v<=maxX; v+=stepRPM){
    const px = left + ((v - minX)/(maxX - minX)) * w;

    ctx.fillText(v, px, top + h + (isMobile ? 18 : 25));
  }
} else {

let step = 1;

if(isMobile && isPortrait){
  step = 3; // 🔥 weniger Labels
}
else if(isMobile){
  step = 2;
}

pts.forEach((p,i)=>{
  if(i % step !== 0) return;

  const px = x(p);
  ctx.fillText(
    Math.round(p.speed),
    px,
    top + h + (isMobile ? 18 : 25)
  );
});

}

  // ===== X TITLE =====
ctx.fillStyle = "#aaa";
ctx.font = fontSmall + "px Arial";

ctx.fillText(
  useRPM ? "U/min" : "km/h",
  width / 2,
  top + h + (isMobile ? 30 : 45)
);

  // ===== Y LABELS =====
  ctx.save();
  ctx.rotate(-Math.PI/2);

  ctx.fillStyle = "red";
  ctx.textAlign = "center";
  ctx.fillText("PS", -h/2, 15);

  if(hasNm){
    ctx.fillStyle = "#00eaff";
    ctx.fillText("Nm", -h/2, width - (isMobile ? 5 : 10));
  }

  ctx.restore();
}

// ---------- MAIN ----------
async function calc(){

  const name = document.getElementById("name").value;

  function isEmpty(id){
    return document.getElementById(id).value.trim() === "";
  }

  if (
    isEmpty("mass") ||
    isEmpty("driver") ||
    isEmpty("cw") ||
    isEmpty("area") ||
    isEmpty("pressure") ||
    isEmpty("temp") ||
    isEmpty("slope")
  ){
    alert("Bitte alle Fahrzeug und Wetterdaten ausfüllen!");
    return;
  }

  let hasInterval = false;
  for (let i = 60; i < 400; i += 10){
    if (!isEmpty("t"+i)) hasInterval = true;
  }

  if(!hasInterval){
    alert("Mindestens ein Intervall eingeben!");
    return;
  }

  // 🔥 DATEN BAUEN
  const data = {
    token: "premium123",

    mass: getVal("mass"),
    driver: getVal("driver"),
    cw: getVal("cw"),
    area: getVal("area"),
    pressure: getVal("pressure"),
    temp: getVal("temp"),
    slope: getVal("slope"),

    dsg: dsg,
    awd: awd,
    showRpmNm: showRpmNm,

    intervals: [],
    gearRefs: {}
  };

  // Intervalle
  for (let i = 60; i < 400; i += 10){
    const time = getVal("t"+i);
    if (!time) continue;

    const gear = parseInt(document.getElementById("g"+i).value);

    data.intervals.push({
      label: `${i}-${i+10}`,
      time: time,
      gear: gear,
      mid: i + 5
    });
  }
const gearsUsed = [...new Set(data.intervals.map(i => i.gear))];
singleGear = gearsUsed.length === 1;

  // Gear refs
  for(let g=3; g<=7; g++){
    const val = getVal("g"+g+"ref");
    if(val) data.gearRefs[g] = val;
  }

  // 🔥 API CALL
  const res = await fetch("https://zeitenjagd-power-calculator.onrender.com/calc", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const server = await res.json();

  if(server.error){
    alert(server.error);
    return;
  }

  const results = server.results;
  const max = server.max;

  // 🔥 ALTEN CODE WEITER NUTZEN
  window.lastResults = results;

  let html = `
  <div class="subtitle" style="margin-top:30px;">MAXIMALE MOTORLEISTUNG</div>
  <div class="big">${max} PS</div>
  <h3>${name}</h3>

  <div class="grid">
    <div class="card">🚗 ${data.mass}kg</div>
    <div class="card">🧍 ${data.driver}kg</div>
    <div class="card">${data.awd ? "AWD ON" : "AWD OFF"}</div>

    <div class="card">cw ${data.cw}</div>
    <div class="card">A ${data.area} m²</div>
    <div class="card">${data.dsg ? "DSG ON" : "DSG OFF"}</div>

    <div class="card">🌬 ${data.pressure} mbar</div>
    <div class="card">🌡 ${data.temp} °C</div>
    <div class="card">📈 Slope ${data.slope}%</div>
  </div>
`;

  html += `<table class="${showRpmNm ? 'full' : 'compact'}">
  <tr>
    <th>Intervall</th>
    <th>Zeit</th>
    <th>PS</th>
    ${showRpmNm ? "<th>Nm</th><th>RPM</th>" : ""}
  </tr>`;

  results.forEach(r=>{

  const isBest = r.ps === max;

  html += `
    <tr class="${isBest ? "highlight-row" : ""}">
      <td>${r.label}</td>
      <td>${r.time}s</td>
      <td class="${isBest ? "highlight" : ""}">${r.ps}</td>
      ${showRpmNm ? `<td>${r.nm}</td><td>${r.rpm}</td>` : ""}
    </tr>
  `;
});

  html += "</table>";

  document.getElementById("result").innerHTML = html;

  showResultPage();

  setTimeout(() => {
    drawGraph(results);
  }, 50);
}

    "temp","slope"
  ];

  // normale Zahlen
  normalFields.forEach(id=>{
